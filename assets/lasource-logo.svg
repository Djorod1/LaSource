<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" role="img" aria-label="LaSource">
  <title>LaSource</title>
  <desc>Logo LaSource — flamme à trois couches (vert, rouge, noir) et nom de la plateforme.</desc>

  <!-- Flamme verte extérieure : la plus grande, qui enveloppe -->
  <path fill="#16A34A"
        d="M 95 12
           C 70 55 42 105 38 165
           C 35 205 60 232 95 234
           C 113 234 119 218 110 202
           C 95 178 84 148 88 115
           C 92 78 108 50 95 12 Z"/>

  <!-- Flamme rouge médiane -->
  <path fill="#B91C1C"
        d="M 105 38
           C 88 80 72 130 86 180
           C 96 215 120 226 130 208
           C 138 192 124 178 118 162
           C 108 130 118 80 105 38 Z"/>

  <!-- Flamme noire intérieure : la plus petite, à droite -->
  <path fill="#1A1A1A"
        d="M 135 78
           C 122 110 116 150 128 188
           C 136 212 154 212 156 192
           C 158 178 148 164 144 146
           C 140 122 142 100 135 78 Z"/>

  <!-- Nom de la plateforme : LaSourc en vert, e final en rouge -->
  <text x="100" y="270"
        font-family="DM Sans, system-ui, sans-serif"
        font-size="36" font-weight="700"
        text-anchor="middle"
        letter-spacing="-0.5">
    <tspan fill="#16A34A">LaSourc</tspan><tspan fill="#B91C1C">e</tspan>
  </text>
</svg>
